name: Java CI/CD with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build and run Unit Tests
      run: ./gradlew build -x integrationTest
      
    - name: Run Integration Tests
      run: ./gradlew integrationTest

  static-analysis:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
        
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Checkstyle
      run: ./gradlew checkstyleMain checkstyleTest
      
    # SonarQube would be run here, assuming SONAR_TOKEN is set in GitHub Secrets
    # - name: SonarQube Scan
    #   env:
    #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
    #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    #   run: ./gradlew build sonar --info

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: OWASP Dependency Check
      run: ./gradlew dependencyCheckAnalyze
      
    # Snyk integration
    # - name: Snyk Security Scan
    #   uses: snyk/actions/setup@master
    # - name: Run Snyk monitor
    #   env:
    #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    #   run: snyk monitor --all-projects

  docker-build-push:
    runs-on: ubuntu-latest
    needs: [static-analysis, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }}, ${{ secrets.DOCKER_USERNAME }}/demo-app:latest

  deploy-dev:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
    - uses: actions/checkout@v3
    
    # Example using kubectl or ArgoCD to deploy. 
    # Usually you'd update an image tag in your k8s manifest repository.
